name: SBOM
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx @cyclonedx/cdxgen@latest -o sbom.json -t pnpm
        env:
          FETCH_LICENSE: 'false'
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
